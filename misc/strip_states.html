<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zine Machine — Interaction States</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a0f14;
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px 0 48px;
    gap: 0;
  }

  /* ── Nav ── */
  .nav {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 20px;
    max-width: 960px;
    justify-content: center;
  }
  .nav button {
    background: #2a1a20;
    color: #b89a84;
    border: 1px solid #3a2a30;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .nav button:hover { background: #3a2530; color: #f4ecd6; }
  .nav button.active { background: #e53e7a; color: #1a0f14; border-color: #e53e7a; font-weight: 600; }

  /* ── Panels ── */
  .row {
    display: flex;
    gap: 0;
  }
  .panel {
    width: 480px;
    height: 380px;
    background: #e53e7a;
    position: relative;
    overflow: hidden;
  }
  .panel + .panel { border-left: 2px solid #1a0f14; }
  .dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, #2a0a18 1.8px, transparent 1.8px);
    background-size: 28px 28px;
    background-position: 14px 14px;
    opacity: 0.65;
    pointer-events: none;
  }
  svg.scene {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    overflow: visible;
  }
  .label-tag {
    position: absolute; top: 0; left: 0;
    background: #f9d0d8; color: #1a0f14;
    font-size: 11px; font-weight: 600;
    padding: 12px 14px 12px 12px;
    border-bottom-right-radius: 8px;
    letter-spacing: 0.04em;
    font-family: monospace;
    z-index: 10;
  }

  /* ── Notes ── */
  .notes-row {
    display: flex;
    width: 960px;
  }
  .note-box {
    flex: 1;
    background: white;
    border: 2px solid #2b7fff;
    padding: 16px 20px;
    min-height: 96px;
  }
  .note-box + .note-box { border-left: none; }
  .note-title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; color: #2b7fff;
    margin-bottom: 6px; font-family: monospace;
  }
  .note-body {
    font-size: 11px; line-height: 1.65;
    color: #1a0f14; font-family: monospace;
  }
  .note-trigger {
    margin-top: 8px; font-size: 10px;
    color: #888; font-family: monospace;
  }

  /* ── Controls ── */
  .controls {
    display: flex; gap: 12px;
    padding: 14px 0 0; align-items: center;
  }
  .controls button {
    background: #2a1a20; color: #f4ecd6;
    border: 1px solid #3a2a30; border-radius: 6px;
    padding: 6px 14px; font-family: monospace;
    font-size: 10px; letter-spacing: 0.08em;
    cursor: pointer; transition: background 0.15s;
  }
  .controls button:hover { background: #3a2530; }
</style>
</head>
<body>

<div class="nav" id="nav"></div>

<div class="row">
  <div class="panel">
    <div class="dots"></div>
    <div class="label-tag" id="label-a"></div>
    <svg class="scene" id="svg-a" viewBox="0 0 480 380"></svg>
  </div>
  <div class="panel">
    <div class="dots"></div>
    <div class="label-tag" id="label-b"></div>
    <svg class="scene" id="svg-b" viewBox="0 0 480 380"></svg>
  </div>
</div>

<div class="notes-row">
  <div class="note-box">
    <div class="note-title" id="note-title-a"></div>
    <div class="note-body"  id="note-body-a"></div>
    <div class="note-trigger" id="note-trigger-a"></div>
  </div>
  <div class="note-box">
    <div class="note-title" id="note-title-b"></div>
    <div class="note-body"  id="note-body-b"></div>
    <div class="note-trigger" id="note-trigger-b"></div>
  </div>
</div>

<div class="controls" id="controls" style="display:none">
  <span style="color:#b89a84;font-size:10px;font-family:monospace;letter-spacing:.08em">PIVOT END:</span>
  <button onclick="togglePivot()">Toggle — currently: <span id="pivot-label">left</span></button>
</div>

<script>
const GRID     = 28;
const STRIP_W  = 0.72;
const HOLE_R   = 2.8;
const HANDLE_R = 9;
const GHOST_R  = 9;
const SIZE     = 5;
const PW       = 480;
const PH       = 380;

const C = {
  part:   '#f4ecd6',
  edge:   '#1a0f14',
  hole:   '#1a0f14',
  select: '#ffd23f',
  ghost:  '#e07060',
};

let pivotIdx = 0;
let currentStateId = '';

// ── Geometry helpers ──
function getHoles(size) {
  return Array.from({ length: size }, (_, i) => ({ x: i, y: 0 }));
}
function originX() { return (PW - (SIZE - 1) * GRID) / 2; }
function originY() { return PH / 2; }
function capPx()   { return STRIP_W / 2 * GRID + GHOST_R + 2; }

// World pos of active handle
function activeHandlePos(pivot) {
  const other = pivot === 0 ? SIZE - 1 : 0;
  const dir   = other > pivot ? 1 : -1;
  return { x: originX() + other * GRID + dir * capPx(), y: originY() };
}
// World pos of ghost handle
function ghostHandlePos(pivot) {
  const dir = pivot === 0 ? -1 : 1;
  return { x: originX() + pivot * GRID + dir * capPx(), y: originY() };
}

// ── SVG element factory ──
function el(tag, attrs, text) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

// ── Core strip ──
function drawStrip(svg, { selected = false, scaling = false, pivot = 0, rotDeg = 0 } = {}) {
  const w   = STRIP_W * GRID;
  const pad = w / 2;
  const len = (SIZE - 1) * GRID;
  const ox  = originX(), oy = originY();

  const g = el('g', { transform: `translate(${ox},${oy}) rotate(${rotDeg})` });

  // Scaling tint behind pill
  if (scaling) {
    g.appendChild(el('rect', {
      x: -pad, y: -w/2, width: len+2*pad, height: w,
      rx: w/2, ry: w/2, fill: '#d4899a',
    }));
  }

  // Pill body
  g.appendChild(el('rect', {
    x: -pad, y: -w/2, width: len+2*pad, height: w,
    rx: w/2, ry: w/2,
    fill: scaling ? 'none' : C.part,
    stroke: C.edge, 'stroke-width': 1.4,
  }));

  // Dashed track
  if (selected) {
    g.appendChild(el('line', {
      x1: 0, y1: 0, x2: len, y2: 0,
      stroke: C.select, 'stroke-width': 1.5, 'stroke-dasharray': '4 3',
    }));
  }

  // Holes
  getHoles(SIZE).forEach((h, i) => {
    const isPivot = selected && i === pivot;
    if (isPivot) {
      g.appendChild(el('circle', { cx: h.x*GRID, cy: 0, r: HOLE_R+1.8, fill: 'none', stroke: C.select, 'stroke-width': 1.8 }));
      g.appendChild(el('circle', { cx: h.x*GRID, cy: 0, r: HOLE_R, fill: C.hole }));
    } else {
      g.appendChild(el('circle', { cx: h.x*GRID, cy: 0, r: HOLE_R, fill: scaling ? '#8a3a50' : C.hole }));
    }
  });

  svg.appendChild(g);
}

// Place a cursor SVG inline into an SVG at world position (x, y), scaled up 1.5x
function drawCursor(svg, type, x, y, scale, rotateDeg) {
  const s = scale ?? 1.5;
  const id = ++_cursorSeq;
  const raw = CURSOR_SVG[type].replace(/cd_FILTER/g, `cd_${id}`).replace(/cc_FILTER/g, `cc_${id}`);
  // Rotate around cursor centre (12,12), then scale, then translate
  const rot = rotateDeg != null ? ` rotate(${rotateDeg} 12 12)` : '';
  const g = el('g', { transform: `translate(${x},${y}) scale(${s})${rot}` });
  g.innerHTML = raw;
  svg.appendChild(g);
}

function drawHandles(svg, pivot) {
  const px  = originX() + pivot * GRID;
  const py  = originY();
  const h   = activeHandlePos(pivot);
  const g   = ghostHandlePos(pivot);

  svg.appendChild(el('line', { x1: px, y1: py, x2: h.x, y2: h.y, stroke: C.select, 'stroke-width': 1.5, 'stroke-dasharray': '3 3', opacity: 0.9 }));
  svg.appendChild(el('circle', { cx: g.x, cy: g.y, r: GHOST_R, fill: C.ghost, stroke: C.edge, 'stroke-width': 1.4, opacity: 0.7 }));
  svg.appendChild(el('circle', { cx: h.x, cy: h.y, r: HANDLE_R, fill: C.select, stroke: C.edge, 'stroke-width': 1.4 }));
}

// ── State definitions ──
const STATES = [
  {
    id: 'idle-selected', nav: 'Idle / Selected',
    showControls: true,
    panels: [
      {
        label: 'Idle',
        draw(svg) {
          drawStrip(svg);
          // Arrow cursor near the strip
          drawCursor(svg, 'arrow', originX() + (SIZE-1)*GRID/2 - 8, originY() - 40);
        },
        noteTitle: 'IDLE STATE',
        noteBody: 'The object rests on the board with no interaction. Pill body and holes only — no handles, no track, no colour changes.',
        noteTrigger: 'Trigger: nothing is selected. User clicked away or just placed the object.',
      },
      {
        label: 'Selected State',
        draw(svg) {
          drawStrip(svg, { selected: true, pivot: pivotIdx });
          drawHandles(svg, pivotIdx);
          // Move cursor over body
          drawCursor(svg, 'move', originX() + (SIZE-1)*GRID/2 - 12, originY() - 38);
        },
        noteTitle: 'SELECTED STATE',
        noteBody: 'The object is selected. A dashed gold track runs through the strip. The pivot hole (anchor) is highlighted with a gold outline. The active handle (gold) sits outside the far end. The ghost handle (salmon) sits outside the pivot end — click it to swap sides.',
        noteTrigger: 'Trigger: user clicks the object body with the select tool.',
      },
    ],
  },
  {
    id: 'rotation', nav: 'Rotation',
    panels: [
      {
        label: 'Rotation state',
        draw(svg) {
          drawStrip(svg, { selected: true, pivot: pivotIdx });
          const px = originX() + pivotIdx * GRID, py = originY();
          const h  = activeHandlePos(pivotIdx);
          const r  = Math.hypot(h.x - px, h.y - py);
          svg.appendChild(el('circle', { cx: px, cy: py, r, fill: 'none', stroke: C.select, 'stroke-width': 1.5, 'stroke-dasharray': '7 5', opacity: 0.8 }));
          drawHandles(svg, pivotIdx);
          // Cursor sits outside the handle along the radius from pivot→handle
          // Tangent = radius angle + 90°
          const radiusAngle = Math.atan2(h.y - py, h.x - px);
          const tangentDeg = radiusAngle * 180 / Math.PI + 90;
          const offset = HANDLE_R + 20;
          const cursorX = h.x + Math.cos(radiusAngle) * offset;
          const cursorY = h.y + Math.sin(radiusAngle) * offset;
          drawCursor(svg, 'rotate_tr', cursorX - 12, cursorY - 12, 1.5, tangentDeg - 45);
        },
        noteTitle: 'ROTATION — HOVER',
        noteBody: 'Hovering outside the active handle reveals the rotation radius as a large dashed circle centred on the pivot hole. Cursor changes to a rotation icon.',
        noteTrigger: 'Trigger: cursor enters the outer zone of the active handle while the object is selected.',
      },
      {
        label: 'Rotation',
        draw(svg) {
          const rotDeg = -50;
          const rotRad = rotDeg * Math.PI / 180;
          drawStrip(svg, { selected: true, pivot: pivotIdx, rotDeg });

          const ox = originX(), oy = originY();

          // Pivot world pos — hole[pivotIdx] rotated around strip origin
          const pivotLocalX = pivotIdx * GRID;
          const px = ox + pivotLocalX * Math.cos(rotRad);
          const py = oy + pivotLocalX * Math.sin(rotRad);

          // Last hole inside strip (one before the handle) — hole[other]
          const other = pivotIdx === 0 ? SIZE - 1 : 0;
          const lastHoleLocalX = other * GRID;
          const lhx = ox + lastHoleLocalX * Math.cos(rotRad);
          const lhy = oy + lastHoleLocalX * Math.sin(rotRad);

          // Arc radius = distance from pivot to last hole
          const arcR = Math.hypot(lhx - px, lhy - py);

          // Active handle position (past the last hole)
          const dir = other > pivotIdx ? 1 : -1;
          const hLocalX = lastHoleLocalX + dir * capPx();
          const hx = ox + hLocalX * Math.cos(rotRad);
          const hy = oy + hLocalX * Math.sin(rotRad);

          // Rotation circle (full radius to handle)
          const fullR = Math.hypot(hx - px, hy - py);
          svg.appendChild(el('circle', { cx: px, cy: py, r: fullR, fill: 'none', stroke: C.select, 'stroke-width': 1.5, 'stroke-dasharray': '7 5', opacity: 0.7 }));

          // Baseline — same colour/thickness as strip track
          svg.appendChild(el('line', { x1: px, y1: py, x2: px + fullR, y2: py, stroke: C.select, 'stroke-width': 1.5, 'stroke-dasharray': '4 3' }));

          // Protractor arc at last-hole radius
          const ax1 = px + arcR, ay1 = py;
          const ax2 = px + arcR * Math.cos(rotRad), ay2 = py + arcR * Math.sin(rotRad);
          svg.appendChild(el('path', { d: `M ${ax1} ${ay1} A ${arcR} ${arcR} 0 0 0 ${ax2} ${ay2}`, fill: 'none', stroke: C.select, 'stroke-width': 2, 'stroke-linecap': 'round' }));

          // Active handle dot
          svg.appendChild(el('circle', { cx: hx, cy: hy, r: HANDLE_R, fill: C.select, stroke: C.edge, 'stroke-width': 1.4 }));

          // Cursor placement identical to hover state, rotation -45° more
          const radiusAngleDrag = Math.atan2(hy - py, hx - px);
          const tangentDegDrag = radiusAngleDrag * 180 / Math.PI + 90;
          const offsetDrag = HANDLE_R + 20;
          const cursorDragX = hx + Math.cos(radiusAngleDrag) * offsetDrag;
          const cursorDragY = hy + Math.sin(radiusAngleDrag) * offsetDrag;
          drawCursor(svg, 'rotate_tr', cursorDragX - 12, cursorDragY - 12, 1.5);
        },
        noteTitle: 'ROTATION — DRAGGING',
        noteBody: 'Dragging rotates the object around the pivot hole. A protractor arc (at last-hole radius) shows the angle swept from the horizontal baseline. The cursor follows the orientation of the object as it turns.',
        noteTrigger: 'Trigger: pointer down on outer zone of active handle, then drag.',
      },
    ],
  },
  {
    id: 'scaling', nav: 'Scaling',
    showControls: true,
    panels: [
      {
        label: 'Scaling on hover',
        draw(svg) {
          drawStrip(svg, { selected: true, pivot: pivotIdx });
          drawHandles(svg, pivotIdx);
          const h   = activeHandlePos(pivotIdx);
          // Resize EW cursor centred on the active handle dot
          drawCursor(svg, 'resize_ew', h.x - 12, h.y - 12);
        },
        noteTitle: 'SCALE — HOVER',
        noteBody: 'Hovering inside the active handle changes the cursor to a bidirectional arrow. This indicates the strip can be stretched or shrunk along its axis from this end.',
        noteTrigger: 'Trigger: cursor enters the inner zone of the active handle while the object is selected.',
      },
      {
        label: 'Scaling when clicked',
        draw(svg) {
          drawStrip(svg, { selected: true, scaling: true, pivot: pivotIdx });
          const h = activeHandlePos(pivotIdx);
          // Active handle dot (gold) — stays visible during scale
          svg.appendChild(el('circle', { cx: h.x, cy: h.y, r: HANDLE_R, fill: C.select, stroke: C.edge, 'stroke-width': 1.4 }));
          // Resize cursor centred on the handle dot
          drawCursor(svg, 'resize_ew', h.x - 12, h.y - 12);
        },
        noteTitle: 'SCALE — ACTIVE',
        noteBody: 'Dragging stretches or shrinks the strip along its axis. The pill fills with a tinted overlay while resizing. The pivot hole stays fixed; only the active end moves.',
        noteTrigger: 'Trigger: pointer down on inner zone of active handle, then drag.',
      },
    ],
  },
  {
    id: 'switch', nav: 'Switch Handle',
    panels: [
      {
        label: 'Switching handle part 1',
        draw(svg) {
          drawStrip(svg, { selected: true, pivot: 0 });
          drawHandles(svg, 0);
        },
        noteTitle: 'SWITCH HANDLE — BEFORE',
        noteBody: 'Active handle (gold) is on the right. Ghost handle (salmon) is on the left. The pivot dot marks the left end as the current anchor.',
        noteTrigger: 'State: default selected, pivot on left.',
      },
      {
        label: 'Switching handle part 2',
        draw(svg) {
          drawStrip(svg, { selected: true, pivot: SIZE - 1 });
          drawHandles(svg, SIZE - 1);
        },
        noteTitle: 'SWITCH HANDLE — AFTER',
        noteBody: 'After clicking the ghost, the active handle moves to the left, the ghost moves to the right, and the pivot dot moves to the right end. All rotation and scaling now operate from the new active end.',
        noteTrigger: 'Trigger: user clicks the ghost (salmon) handle.',
      },
    ],
  },
  {
    id: 'drag', nav: 'Drag & Drop',
    panels: [
      {
        label: 'Drag and drop part 1',
        draw(svg) {
          const w = STRIP_W * GRID, pad = w / 2, len = (SIZE-1)*GRID;
          const rawOx = originX(), rawOy = originY();
          const ox = Math.round((rawOx - 14) / GRID) * GRID + 14;
          const oy = Math.round((rawOy - 14) / GRID) * GRID + 14;
          const g = el('g', { transform: `translate(${ox},${oy})` });
          g.appendChild(el('rect', { x:-pad, y:-w/2, width:len+2*pad, height:w, rx:w/2, ry:w/2, fill:C.part, stroke:C.edge, 'stroke-width':1.4 }));
          getHoles(SIZE).forEach(h => g.appendChild(el('circle', { cx:h.x*GRID, cy:0, r:HOLE_R, fill:C.hole })));
          svg.appendChild(g);
          drawCursor(svg, 'move', ox + len/2 - 12, oy - 38);
        },
        noteTitle: 'DRAG — GRABBED',
        noteBody: 'Clicking and dragging the strip body (not a handle) enters move mode. Cursor changes to a four-way move icon. Handles disappear for the duration of the drag.',
        noteTrigger: 'Trigger: pointer down on the pill body, then drag.',
      },
      {
        label: 'Drag and drop part 2',
        draw(svg) {
          const w = STRIP_W * GRID, pad = w / 2, len = (SIZE-1)*GRID;

          // Snap both strips to dot grid (dots at 14 + n*28)
          // originX() centres the strip — round to nearest grid column
          const rawOx = originX(), rawOy = originY();
          const ox = Math.round((rawOx - 14) / GRID) * GRID + 14;
          const oy = Math.round((rawOy - 14) / GRID) * GRID + 14;

          // Dropped strip — offset by 2 grid columns right, 2 rows down
          const nx = ox + 2 * GRID;
          const ny = oy + 2 * GRID;

          // Ghost outline at origin
          const gg = el('g', { transform: `translate(${ox},${oy})` });
          gg.appendChild(el('rect', { x:-pad, y:-w/2, width:len+2*pad, height:w, rx:w/2, ry:w/2, fill:'none', stroke:C.select, 'stroke-width':1.5, 'stroke-dasharray':'5 4' }));
          getHoles(SIZE).forEach(h => gg.appendChild(el('circle', { cx:h.x*GRID, cy:0, r:HOLE_R, fill:C.select, opacity:0.45 })));
          svg.appendChild(gg);

          // Dropped strip
          const ng = el('g', { transform: `translate(${nx},${ny})` });
          ng.appendChild(el('rect', { x:-pad, y:-w/2, width:len+2*pad, height:w, rx:w/2, ry:w/2, fill:C.part, stroke:C.edge, 'stroke-width':1.4 }));
          getHoles(SIZE).forEach(h => ng.appendChild(el('circle', { cx:h.x*GRID, cy:0, r:HOLE_R, fill:C.hole })));
          svg.appendChild(ng);
          drawCursor(svg, 'move', nx + len/2 - 12, ny - 38);
        },
        noteTitle: 'DRAG — DROPPED',
        noteBody: 'On release the strip snaps to its new position. A dashed ghost outline stays at the original position to show where the object came from. Cursor returns to default.',
        noteTrigger: 'Trigger: pointer up after dragging.',
      },
    ],
  },
];

// ── Render ──
function render(stateId) {
  currentStateId = stateId;
  const state = STATES.find(s => s.id === stateId);
  if (!state) return;

  document.querySelectorAll('.nav button').forEach(b =>
    b.classList.toggle('active', b.dataset.id === stateId)
  );

  ['a','b'].forEach((side, i) => {
    const panel = state.panels[i];
    const svg   = document.getElementById(`svg-${side}`);
    svg.innerHTML = '';
    document.getElementById(`label-${side}`).textContent      = panel?.label ?? '';
    document.getElementById(`note-title-${side}`).textContent = panel?.noteTitle ?? '';
    document.getElementById(`note-body-${side}`).textContent  = panel?.noteBody ?? '';
    document.getElementById(`note-trigger-${side}`).textContent = panel?.noteTrigger ?? '';
    if (panel) panel.draw(svg);
  });

  document.getElementById('controls').style.display = state.showControls ? 'flex' : 'none';
  document.getElementById('angle-ref').style.display = stateId === 'rotation' ? 'block' : 'none';
  document.getElementById('scale-angle-ref').style.display = stateId === 'scaling' ? 'block' : 'none';
}

function togglePivot() {
  pivotIdx = pivotIdx === 0 ? SIZE - 1 : 0;
  document.getElementById('pivot-label').textContent = pivotIdx === 0 ? 'left' : 'right';
  render(currentStateId);
}

// Build nav
const nav = document.getElementById('nav');
STATES.forEach(s => {
  const btn = document.createElement('button');
  btn.textContent = s.nav;
  btn.dataset.id  = s.id;
  btn.onclick     = () => render(s.id);
  nav.appendChild(btn);
});

// ── Rotation drag — all angles ──
function drawRotationDragAtAngle(svg, rotDeg) {
  const rotRad = rotDeg * Math.PI / 180;
  const pivot  = 0; // always left pivot for reference
  drawStrip(svg, { selected: true, pivot, rotDeg });

  const ox = originX(), oy = originY();
  const pivotLocalX = pivot * GRID;
  const px = ox + pivotLocalX * Math.cos(rotRad);
  const py = oy + pivotLocalX * Math.sin(rotRad);

  const other = SIZE - 1;
  const lastHoleLocalX = other * GRID;
  const lhx = ox + lastHoleLocalX * Math.cos(rotRad);
  const lhy = oy + lastHoleLocalX * Math.sin(rotRad);
  const arcR = Math.hypot(lhx - px, lhy - py);

  const hLocalX = lastHoleLocalX + capPx();
  const hx = ox + hLocalX * Math.cos(rotRad);
  const hy = oy + hLocalX * Math.sin(rotRad);
  const fullR = Math.hypot(hx - px, hy - py);

  svg.appendChild(el('circle', { cx: px, cy: py, r: fullR, fill: 'none', stroke: C.select, 'stroke-width': 1.5, 'stroke-dasharray': '7 5', opacity: 0.7 }));
  svg.appendChild(el('line', { x1: px, y1: py, x2: px + fullR, y2: py, stroke: C.select, 'stroke-width': 1.5, 'stroke-dasharray': '4 3' }));

  const normalizedRad = ((rotDeg % 360) + 360) % 360 * Math.PI / 180;
  const ax1 = px + arcR, ay1 = py;
  const ax2 = px + arcR * Math.cos(normalizedRad), ay2 = py + arcR * Math.sin(normalizedRad);
  const large = normalizedRad > Math.PI ? 1 : 0;
  svg.appendChild(el('path', { d: `M ${ax1} ${ay1} A ${arcR} ${arcR} 0 ${large} 1 ${ax2} ${ay2}`, fill: 'none', stroke: C.select, 'stroke-width': 2, 'stroke-linecap': 'round' }));
  svg.appendChild(el('circle', { cx: hx, cy: hy, r: HANDLE_R, fill: C.select, stroke: C.edge, 'stroke-width': 1.4 }));

  const radiusAngle = Math.atan2(hy - py, hx - px);
  const offset = HANDLE_R + 20;
  const cursorX = hx + Math.cos(radiusAngle) * offset;
  const cursorY = hy + Math.sin(radiusAngle) * offset;
  drawCursor(svg, 'rotate_tr', cursorX - 12, cursorY - 12, 1.5, radiusAngle * 180 / Math.PI + 90 - 45);
}

const refSection = document.createElement('div');
refSection.id = 'angle-ref';
refSection.style.cssText = 'margin-top:32px;width:960px;display:none';

const refTitle = document.createElement('div');
refTitle.style.cssText = 'color:#b89a84;font-size:10px;font-family:monospace;letter-spacing:.1em;margin-bottom:16px;text-align:center';
refTitle.textContent = 'ROTATION DRAGGING — ALL ANGLES (every 15°)';
refSection.appendChild(refTitle);

const refGrid = document.createElement('div');
refGrid.style.cssText = 'display:flex;flex-wrap:wrap;gap:2px;justify-content:center';

for (let deg = 0; deg < 360; deg += 15) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:relative;background:#e53e7a;overflow:hidden;border-radius:4px';
  wrap.style.width = '156px';
  wrap.style.height = '156px';

  // dot grid
  const dots = document.createElement('div');
  dots.style.cssText = `position:absolute;inset:0;background-image:radial-gradient(circle,#2a0a18 1.2px,transparent 1.2px);background-size:${GRID*0.65}px ${GRID*0.65}px;background-position:${GRID*0.325}px ${GRID*0.325}px;opacity:.65;pointer-events:none`;
  wrap.appendChild(dots);

  const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgEl.setAttribute('width', '156');
  svgEl.setAttribute('height', '156');
  svgEl.style.cssText = 'position:absolute;inset:0';

  // Scale down — panels are 156px vs 480px → scale factor ~0.325
  const scale = 156 / 480;
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('transform', `scale(${scale})`);
  // We need a fresh mini-svg context — draw into g
  const miniSvg = { appendChild: (c) => g.appendChild(c), innerHTML: '' };
  drawRotationDragAtAngle(miniSvg, deg);
  svgEl.appendChild(g);

  const label = document.createElement('div');
  label.style.cssText = 'position:absolute;bottom:4px;left:0;right:0;text-align:center;color:white;font-size:9px;font-family:monospace;opacity:.8';
  label.textContent = `${deg}°`;

  wrap.appendChild(svgEl);
  wrap.appendChild(label);
  refGrid.appendChild(wrap);
}

refSection.appendChild(refGrid);
document.body.appendChild(refSection);

// ── Scale — all angles ──
function drawScaleAtAngle(svg, rotDeg) {
  const rotRad = rotDeg * Math.PI / 180;
  drawStrip(svg, { selected: true, pivot: 0, rotDeg });

  // Active handle position
  const ox = originX(), oy = originY();
  const other = SIZE - 1;
  const hLocalX = other * GRID + capPx();
  const hx = ox + hLocalX * Math.cos(rotRad);
  const hy = oy + hLocalX * Math.sin(rotRad);

  // Gold handle dot
  svg.appendChild(el('circle', { cx: hx, cy: hy, r: HANDLE_R, fill: C.select, stroke: C.edge, 'stroke-width': 1.4 }));

  // Dashed axis line from pivot to handle
  const px = ox, py = oy;
  svg.appendChild(el('line', { x1: px, y1: py, x2: hx, y2: hy, stroke: C.select, 'stroke-width': 1.5, 'stroke-dasharray': '3 3', opacity: 0.9 }));

  // resize_ew cursor rotated to match strip axis
  drawCursor(svg, 'resize_ew', hx - 12, hy - 12, 1.5, rotDeg);
}

const scaleSection = document.createElement('div');
scaleSection.id = 'scale-angle-ref';
scaleSection.style.cssText = 'margin-top:32px;width:960px;display:none';

const scaleTitle = document.createElement('div');
scaleTitle.style.cssText = 'color:#b89a84;font-size:10px;font-family:monospace;letter-spacing:.1em;margin-bottom:16px;text-align:center';
scaleTitle.textContent = 'SCALE CURSOR — ALL ANGLES (every 15°)';
scaleSection.appendChild(scaleTitle);

const scaleGrid = document.createElement('div');
scaleGrid.style.cssText = 'display:flex;flex-wrap:wrap;gap:2px;justify-content:center';

for (let deg = 0; deg < 360; deg += 15) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:relative;background:#e53e7a;overflow:hidden;border-radius:4px';
  wrap.style.width = '156px';
  wrap.style.height = '156px';

  const dots = document.createElement('div');
  dots.style.cssText = `position:absolute;inset:0;background-image:radial-gradient(circle,#2a0a18 1.2px,transparent 1.2px);background-size:${GRID*0.65}px ${GRID*0.65}px;background-position:${GRID*0.325}px ${GRID*0.325}px;opacity:.65;pointer-events:none`;
  wrap.appendChild(dots);

  const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgEl.setAttribute('width', '156');
  svgEl.setAttribute('height', '156');
  svgEl.style.cssText = 'position:absolute;inset:0';

  const scale = 156 / 480;
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('transform', `scale(${scale})`);
  const miniSvg = { appendChild: (c) => g.appendChild(c) };
  drawScaleAtAngle(miniSvg, deg);
  svgEl.appendChild(g);

  const label = document.createElement('div');
  label.style.cssText = 'position:absolute;bottom:4px;left:0;right:0;text-align:center;color:white;font-size:9px;font-family:monospace;opacity:.8';
  label.textContent = `${deg}°`;

  wrap.appendChild(svgEl);
  wrap.appendChild(label);
  scaleGrid.appendChild(wrap);
}

scaleSection.appendChild(scaleGrid);
document.body.appendChild(scaleSection);

render(STATES[0].id);</script>
